<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Presenter — Agentic AI</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #3dd76c;
    --bg: #0a1a18;
    --card: #0f2926;
    --border: rgba(61,215,108,.2);
    --text: #fff;
    --dim: rgba(255,255,255,.45);
    --pink: #FB49AD;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .topbar-title {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--green);
  }
  .topbar-slide {
    font-size: 13px;
    color: var(--dim);
    font-weight: 600;
  }
  .topbar-status {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #555;
    flex-shrink: 0;
  }
  .topbar-status.connected { background: var(--green); }

  .topbar-timer {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #timer-display {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: rgba(255,255,255,.7);
    font-variant-numeric: tabular-nums;
    min-width: 48px;
  }
  #timer-display.running { color: var(--green); }
  .timer-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,.4);
    padding: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .timer-btn:active { color: var(--green); }
  .timer-btn svg { width: 14px; height: 14px; }

  .topbar-room {
    font-family: 'Poppins', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--green);
    background: rgba(61,215,108,.1);
    padding: 2px 10px;
    border-radius: 10px;
  }

  /* ── PROGRESS ── */
  .progress-track {
    height: 3px;
    background: rgba(255,255,255,.06);
    flex-shrink: 0;
  }
  .progress-fill {
    height: 100%;
    background: var(--green);
    transition: width .3s ease;
  }

  /* ── SLIDE HEADER ── */
  .slide-header {
    padding: 14px 20px 8px;
    flex-shrink: 0;
  }
  .slide-section {
    font-size: 11px;
    color: var(--dim);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 2px;
  }
  .slide-title {
    font-family: 'Poppins', sans-serif;
    font-weight: 800;
    font-size: 20px;
    line-height: 1.25;
    color: #fff;
  }

  /* ── NOTES AREA ── */
  .notes-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 6px 20px 20px;
  }
  .notes-area::-webkit-scrollbar { display: none; }

  /* Key message — the ONE thing to say */
  .note-key {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.55;
    color: #fff;
    padding: 14px 16px;
    background: rgba(61,215,108,.08);
    border-left: 4px solid var(--green);
    border-radius: 0 10px 10px 0;
    margin-bottom: 14px;
  }
  .note-key em {
    color: var(--green);
    font-style: normal;
    font-weight: 800;
  }

  /* Talking points */
  .note-points {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 14px;
  }
  .note-point {
    font-size: 17px;
    line-height: 1.6;
    color: rgba(255,255,255,.85);
    padding-left: 16px;
    position: relative;
  }
  .note-point::before {
    content: '';
    position: absolute;
    left: 0;
    top: 10px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,.25);
  }
  .note-point strong {
    color: #fff;
    font-weight: 700;
  }
  .note-point em {
    color: var(--green);
    font-style: normal;
    font-weight: 600;
  }
  .note-point .hi {
    color: var(--pink);
    font-weight: 700;
  }

  /* Stage cue */
  .note-cue {
    font-size: 14px;
    color: var(--dim);
    font-style: italic;
    padding: 8px 12px;
    background: rgba(255,255,255,.03);
    border-radius: 8px;
    margin-bottom: 14px;
  }


  /* ── BOTTOM BAR (transition + controls) ── */
  .bottom-bar {
    flex-shrink: 0;
    background: var(--card);
    border-top: 1px solid var(--border);
  }
  .note-transition {
    padding: 10px 16px;
    font-size: 16px;
    font-weight: 600;
    color: var(--green);
    line-height: 1.4;
    border-bottom: 1px solid rgba(61,215,108,.1);
  }
  .note-transition::before {
    content: 'SAY: ';
    font-size: 10px;
    letter-spacing: 2px;
    opacity: .5;
  }
  .note-transition:empty { display: none; }
  .controls {
    display: flex;
    gap: 10px;
    padding: 10px 16px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
  }
  .btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 18px;
    border: none;
    border-radius: 14px;
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 17px;
    cursor: pointer;
    transition: transform .1s, opacity .15s;
    -webkit-user-select: none;
    user-select: none;
  }
  .btn:active { transform: scale(.95); }
  .btn-prev {
    background: rgba(255,255,255,.08);
    color: rgba(255,255,255,.6);
  }
  .btn-prev:disabled { opacity: .25; }
  .btn-next {
    background: var(--green);
    color: var(--bg);
    flex: 2;
  }
  .btn-next:disabled { opacity: .4; }
  .btn svg { width: 22px; height: 22px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">Presenter</div>
  <div class="topbar-timer">
    <span id="timer-display">00:00</span>
    <button class="timer-btn" id="timer-toggle" title="Start/Stop">
      <svg id="timer-icon-play" viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><polygon points="6,4 20,12 6,20"/></svg>
      <svg id="timer-icon-pause" viewBox="0 0 24 24" fill="currentColor" width="14" height="14" style="display:none"><rect x="5" y="4" width="4" height="16"/><rect x="15" y="4" width="4" height="16"/></svg>
    </button>
    <button class="timer-btn" id="timer-reset" title="Reset">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="14" height="14"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
    </button>
  </div>
  <div class="topbar-room" id="room-badge"></div>
  <div class="topbar-slide" id="slide-counter">1 / 39</div>
  <div class="topbar-status" id="status-dot" title="Disconnected"></div>
</div>
<div class="progress-track"><div class="progress-fill" id="progress"></div></div>

<div class="slide-header">
  <div class="slide-section" id="slide-section"></div>
  <div class="slide-title" id="slide-title"></div>
</div>

<div class="notes-area">
  <div id="notes-content"></div>
</div>

<div class="bottom-bar">
  <div class="note-transition" id="transition-line"></div>
  <div class="controls">
    <button class="btn btn-prev" id="btn-prev" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button class="btn btn-next" id="btn-next">
      Next
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>
</div>

<script>
// ── NOTES SYSTEM ──
// Notes loaded from config/notes.json, keyed by data-key attributes on slides.
// Slide order comes from the audience page (via broadcast) or falls back to key order from JSON.
var NOTES = {};       // key → note object
var SLIDE_ORDER = []; // ordered array of keys
var TOTAL = 0;
var currentIdx = 0;   // index into SLIDE_ORDER

// Fallback order — used standalone when no audience sends slide-order
var FALLBACK_ORDER = [
  "cover","ai-everywhere","spectrum","what-is-agentic","chatbot-vs-agent",
  "integration-layer","impact-divider","before-after","already-happening",
  "tipping-point","how-divider","connections-divider","why-connections",
  "what-is-mcp","mcp-in-action","human-control-divider","human-in-loop",
  "trust-gradient","context-divider","what-is-context","context-before-after",
  "four-layers","changes-your-work","everyone-can-build","temper-divider",
  "our-opportunity","more-use-cases","agentic-tools","gemini","workspace-studio",
  "ai-built-in","hidden-dangers","safety-quote","safety-checklist",
  "discovering-tools","plot-twist","how-made","full-picture","start-this-week","qa"
];

var elTitle = document.getElementById('slide-title');
var elSection = document.getElementById('slide-section');
var elNotes = document.getElementById('notes-content');
var elCounter = document.getElementById('slide-counter');
var elProgress = document.getElementById('progress');
var elStatus = document.getElementById('status-dot');
var btnPrev = document.getElementById('btn-prev');
var btnNext = document.getElementById('btn-next');

// Load notes from JSON
fetch('config/notes.json').then(function(r) { return r.json(); }).then(function(data) {
  NOTES = data;
  SLIDE_ORDER = FALLBACK_ORDER;
  TOTAL = SLIDE_ORDER.length;
  render();
}).catch(function() {
  elNotes.innerHTML = '<div class="note-cue">Failed to load notes.json</div>';
});

function currentKey() {
  return SLIDE_ORDER[currentIdx] || '';
}

function getNotes(key) {
  return NOTES[key] || { title: key, section: '', key: '', points: [], transition: null };
}

function render() {
  if (!TOTAL) return;
  var s = getNotes(currentKey());
  elTitle.textContent = s.title || currentKey();
  elSection.textContent = s.section || '';
  elCounter.textContent = (currentIdx + 1) + ' / ' + TOTAL;
  elProgress.style.width = ((currentIdx + 1) / TOTAL * 100) + '%';

  var html = '';
  if (s.key) html += '<div class="note-key">' + s.key + '</div>';
  if (s.cue) html += '<div class="note-cue">' + s.cue + '</div>';
  if (s.points && s.points.length) {
    html += '<ul class="note-points">';
    s.points.forEach(function(p) { html += '<li class="note-point">' + p + '</li>'; });
    html += '</ul>';
  }
  elNotes.innerHTML = html;

  var elTransition = document.getElementById('transition-line');
  elTransition.textContent = s.transition || '';
  elTransition.style.display = s.transition ? '' : 'none';
  elNotes.parentElement.scrollTop = 0;

  btnPrev.disabled = currentIdx === 0;
  btnNext.disabled = currentIdx === TOTAL - 1;
  btnNext.innerHTML = currentIdx === TOTAL - 1
    ? 'End'
    : 'Next <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>';
}

// Go to a slide by its key
function goToKey(key) {
  var idx = SLIDE_ORDER.indexOf(key);
  if (idx >= 0 && idx !== currentIdx) {
    currentIdx = idx;
    render();
  }
}

// Go to a slide by its index
function goToIdx(idx) {
  if (idx >= 0 && idx < TOTAL && idx !== currentIdx) {
    currentIdx = idx;
    render();
  }
}

// ── SUPABASE SYNC ──
var SUPABASE_URL = 'https://nubrmjgjmmsktnpbkmlh.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51YnJtamdqbW1za3RucGJrbWxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NzE5MjYsImV4cCI6MjA4OTI0NzkyNn0.5Uz4KMC0drOPG6xxs8XIpoOL7b8aYxD26TwrVnbm72o';

var sb = null;
var channel = null;

var urlParams = new URLSearchParams(window.location.search);
var ROOM = urlParams.get('room') || (Math.floor(1000 + Math.random() * 9000).toString());
if (!urlParams.get('room')) {
  history.replaceState(null, '', '?room=' + ROOM + window.location.hash);
}
document.getElementById('room-badge').textContent = ROOM;

var audienceConnected = false;

function writeSlideToDb() {
  if (!sb) return;
  sb.from('presentation_state').upsert({ room: ROOM, slide: currentIdx + 1, reveal: 0, updated_at: new Date().toISOString() }).then(function () {});
}

function sendCommand(direction) {
  if (audienceConnected && channel) {
    channel.send({ type: 'broadcast', event: 'command', payload: { direction: direction } });
  } else {
    var next = direction === 'next' ? currentIdx + 1 : currentIdx - 1;
    if (next >= 0 && next < TOTAL) {
      currentIdx = next;
      render();
      writeSlideToDb();
    }
  }
}

function updatePresence(state) {
  var presences = state ? Object.values(state) : [];
  var found = false;
  for (var i = 0; i < presences.length; i++) {
    var list = presences[i];
    for (var j = 0; j < list.length; j++) {
      if (list[j].role === 'audience') { found = true; break; }
    }
    if (found) break;
  }
  audienceConnected = found;
  if (found) {
    elStatus.classList.add('connected');
    elStatus.title = 'Audience connected';
  } else {
    elStatus.classList.remove('connected');
    elStatus.title = 'No audience';
  }
}

function initSupabase() {
  var script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
  script.onload = function() {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    channel = sb.channel('room-' + ROOM);

    // Audience sends slide-update with key — use key for lookup
    channel.on('broadcast', { event: 'slide-update' }, function(payload) {
      var key = payload.payload.key;
      if (key && NOTES[key]) {
        goToKey(key);
      } else {
        // Fallback to index
        var slide = payload.payload.slide;
        if (slide >= 0 && slide < TOTAL) goToIdx(slide);
      }
    });

    // Audience sends slide order on connect — use it as the real order
    channel.on('broadcast', { event: 'slide-order' }, function(payload) {
      var keys = payload.payload.keys;
      if (keys && keys.length) {
        SLIDE_ORDER = keys;
        TOTAL = keys.length;
        render();
      }
    });

    channel.on('presence', { event: 'sync' }, function() {
      updatePresence(channel.presenceState());
    });

    channel.subscribe(function(status) {
      if (status === 'SUBSCRIBED') {
        channel.track({ role: 'presenter', room: ROOM });
      }
    });

    sb.from('presentation_state').select('slide').eq('room', ROOM).single().then(function(res) {
      if (res.data && res.data.slide >= 1 && res.data.slide <= TOTAL) {
        currentIdx = res.data.slide - 1;
        render();
      }
    });
  };
  script.onerror = function() {
    elStatus.title = 'Failed to load';
  };
  document.head.appendChild(script);
}

// ── CONTROLS ──
btnPrev.addEventListener('click', function() { sendCommand('prev'); });
btnNext.addEventListener('click', function() { sendCommand('next'); });

// Swipe support
var touchStartX = 0;
var touchStartY = 0;
document.addEventListener('touchstart', function(e) {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', function(e) {
  var dx = e.changedTouches[0].clientX - touchStartX;
  var dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx)) return;
  if (dx < 0) sendCommand('next');
  else sendCommand('prev');
}, { passive: true });

// Keyboard (desktop testing)
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); sendCommand('next'); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); sendCommand('prev'); }
});

// ── TIMER ──
var timerDisplay = document.getElementById('timer-display');
var timerToggle = document.getElementById('timer-toggle');
var timerReset = document.getElementById('timer-reset');
var iconPlay = document.getElementById('timer-icon-play');
var iconPause = document.getElementById('timer-icon-pause');
var timerRunning = false;
var timerStart = 0;
var timerElapsed = 0;
var timerRAF = null;

function formatTime(ms) {
  var s = Math.floor(ms / 1000);
  var m = Math.floor(s / 60);
  s = s % 60;
  return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
}

function tickTimer() {
  timerDisplay.textContent = formatTime(timerElapsed + (Date.now() - timerStart));
  timerRAF = requestAnimationFrame(tickTimer);
}

timerToggle.addEventListener('click', function() {
  if (timerRunning) {
    timerElapsed += Date.now() - timerStart;
    cancelAnimationFrame(timerRAF);
    timerRunning = false;
    timerDisplay.classList.remove('running');
    iconPlay.style.display = '';
    iconPause.style.display = 'none';
  } else {
    timerStart = Date.now();
    timerRunning = true;
    timerDisplay.classList.add('running');
    iconPlay.style.display = 'none';
    iconPause.style.display = '';
    tickTimer();
  }
});

timerReset.addEventListener('click', function() {
  cancelAnimationFrame(timerRAF);
  timerRunning = false;
  timerElapsed = 0;
  timerDisplay.textContent = '00:00';
  timerDisplay.classList.remove('running');
  iconPlay.style.display = '';
  iconPause.style.display = 'none';
});

// ── INIT ──
render();
initSupabase();
</script>
</body>
</html>
